# NcatBot 5.x configuration example

root: "your-admin-qq"
bot_uin: "your-bot-qq"
debug: false
enable_webui_interaction: false
check_ncatbot_update: true
skip_ncatbot_install_check: false

adapters:
  - type: napcat
    platform: qq
    enabled: true
    config:
      ws_uri: "ws://localhost:3001"
      ws_token: ""
      webui_uri: "http://localhost:6099"
      webui_token: "napcat"
      enable_webui: true
      enable_update_check: false
      stop_napcat: false

plugin:
  load_plugin: true
  plugins_dir: "plugins"
  hot_reload: true

logging:
  event_log_levels:
    meta_event: NONE
  event_log_format: summary

llm:
  api_key: "fake-api-key"
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  temperature: 0.7
  max_tokens: 800
  context:
    enabled: true
    max_turns: 6

storage:
  sqlite_path: "data/drive_bot.sqlite3"

tasks:
  estimates:
    jm_download: 480
    setu: 45
    daily: 30
