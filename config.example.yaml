# NcatBot 5.x configuration example

root: "your-admin-qq"
bot_uin: "your-bot-qq"
debug: false
enable_webui_interaction: false
check_ncatbot_update: true
skip_ncatbot_install_check: false

adapters:
  - type: napcat
    platform: qq
    enabled: true
    config:
      ws_uri: "ws://localhost:3001"
      ws_token: ""
      webui_uri: "http://localhost:6099"
      webui_token: "napcat"
      enable_webui: true
      enable_update_check: false
      stop_napcat: false

plugin:
  load_plugin: true
  plugins_dir: "plugins"
  hot_reload: true

logging:
  event_log_levels:
    meta_event: NONE
  event_log_format: summary

llm:
  api_key: "fake-api-key"
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  temperature: 0.7
  max_tokens: 800
  short_conversation_max_tokens: 800
  long_conversation_max_tokens: 4000
  context:
    enabled: true
    max_turns: 6
  memory:
    enabled: true
    group_enabled: true
    private_enabled: false
    summarize_hour: 0
    timezone: "Asia/Shanghai"
    max_daily_messages: 200
    prompt_max_chars: 1500
    include_commands: false

storage:
  sqlite_path: "data/drive_bot.sqlite3"

tasks:
  estimates:
    jm_download: 480
    setu: 45
    daily: 30
    daily_ai: 60
  daily_news:
    api_key: "your-currents-api-key"
    language: "en"
    max_items: 10
  daily_ai:
    base_path: "/path/to/your/markdown/folder"
  anime_news:
    file_path: "/path/to/your/anime/news.md"
