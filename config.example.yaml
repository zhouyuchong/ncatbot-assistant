# NcatBot 5.x configuration example

root: "your-admin-qq"
bot_uin: "your-bot-qq"
debug: false
enable_webui_interaction: false
check_ncatbot_update: true
skip_ncatbot_install_check: false

adapters:
  - type: napcat
    platform: qq
    enabled: true
    config:
      ws_uri: "ws://localhost:3001"
      ws_token: ""
      webui_uri: "http://localhost:6099"
      webui_token: "napcat"
      enable_webui: true
      enable_update_check: false
      stop_napcat: false

plugin:
  load_plugin: true
  plugins_dir: "plugins"
  hot_reload: true

logging:
  event_log_levels:
    meta_event: NONE
  event_log_format: summary
